<!DOCTYPE html>
<html>
<head>
<style>
html { background: #0D0F1A; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  display: flex;
  background-image: url('assets/bg-title.png');
  background-size: 720pt 405pt;
}
.container {
  margin: 0; padding: 0;
  width: 720pt; height: 405pt;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.accent-bar {
  width: 400pt; height: 3pt;
  margin: 0 auto;
}
.top-bar {
  margin-top: 80pt;
  margin-bottom: 20pt;
}
.bottom-bar {
  margin-top: 20pt;
  margin-bottom: 0;
}
h1 {
  color: #FFFFFF;
  font-size: 28pt;
  font-weight: bold;
  text-align: center;
  margin: 0;
  padding: 0;
  letter-spacing: 2px;
}
.subtitle {
  color: #94A3B8;
  font-size: 16pt;
  text-align: center;
  margin: 12pt 0 0 0;
}
.date {
  color: #8B5CF6;
  font-size: 14pt;
  text-align: center;
  margin: 8pt 0 0 0;
}
.star-left {
  position: absolute;
  left: 60pt;
  top: 170pt;
}
.star-right {
  position: absolute;
  right: 60pt;
  top: 170pt;
}
</style>
</head>
<body>
<div class="container">
  <img src="assets/star-icon.png" class="star-left" style="width: 40pt; height: 40pt;">
  <img src="assets/star-icon.png" class="star-right" style="width: 40pt; height: 40pt;">
  <img src="assets/accent-bar.png" class="accent-bar top-bar" style="width: 400pt; height: 3pt;">
  <h1>SISTEMA ECONOMICO<br>COPA OMEGA STAR</h1>
  <p class="subtitle">Plan de Implementacion - Bladers Santa Fe</p>
  <p class="date">Marzo 2026</p>
  <img src="assets/accent-bar.png" class="accent-bar bottom-bar" style="width: 400pt; height: 3pt;">
</div>
</body>
</html>
