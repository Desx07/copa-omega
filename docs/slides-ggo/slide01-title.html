<!DOCTYPE html>
<html>
<head>
<style>
html { background: #0A0E1A; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  display: flex;
  background-image: url('assets/bg-title.png');
  background-size: 720pt 405pt;
}
.container {
  margin: 0; padding: 0;
  width: 720pt; height: 405pt;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.icons-row {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 20pt;
  margin: 0 0 12pt 0;
}
.bar {
  margin: 14pt 0;
}
h1 {
  color: #FFFFFF;
  font-size: 40pt;
  font-weight: bold;
  text-align: center;
  margin: 0;
  letter-spacing: 3px;
}
.subtitle {
  color: #94A3B8;
  font-size: 16pt;
  text-align: center;
  margin: 8pt 0 0 0;
}
.tagline {
  color: #06B6D4;
  font-size: 14pt;
  text-align: center;
  margin: 16pt 0 0 0;
  font-style: italic;
}
.brand {
  color: #8B5CF6;
  font-size: 11pt;
  text-align: center;
  margin: 24pt 0 0 0;
  letter-spacing: 2px;
}
</style>
</head>
<body>
<div class="container">
  <div class="icons-row">
    <img src="assets/star-icon.png" style="width: 60pt; height: 60pt;">
    <img src="assets/coin-icon.png" style="width: 60pt; height: 60pt;">
  </div>
  <h1>ESTRELLAS y OMEGA COINS</h1>
  <img src="assets/accent-purple.png" class="bar" style="width: 350pt; height: 3pt;">
  <p class="subtitle">Los dos sistemas de juego de Bladers Santa Fe</p>
  <p class="tagline">"Tu habilidad ahora vale de verdad"</p>
  <p class="brand">COPA OMEGA STAR</p>
</div>
</body>
</html>
