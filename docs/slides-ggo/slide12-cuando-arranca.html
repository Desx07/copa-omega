<!DOCTYPE html>
<html>
<head>
<style>
html { background: #0A0E1A; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  display: flex;
  background-image: url('assets/bg-title.png');
  background-size: 720pt 405pt;
}
.container {
  margin: 0; padding: 0;
  width: 720pt; height: 405pt;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.rocket-img { margin: 0 0 10pt 0; }
.soon {
  color: #F59E0B;
  font-size: 40pt;
  font-weight: bold;
  text-align: center;
  margin: 0 0 6pt 0;
  letter-spacing: 3px;
}
.bar { margin: 10pt 0; }
.info {
  color: #FFFFFF;
  font-size: 14pt;
  text-align: center;
  margin: 4pt 0;
}
.url {
  color: #06B6D4;
  font-size: 14pt;
  font-weight: bold;
  text-align: center;
  margin: 4pt 0;
}
.social {
  color: #8B5CF6;
  font-size: 13pt;
  text-align: center;
  margin: 4pt 0;
}
.tagline {
  color: #FFFFFF;
  font-size: 16pt;
  font-weight: bold;
  font-style: italic;
  text-align: center;
  margin: 16pt 0 0 0;
}
.brand {
  color: #8B5CF6;
  font-size: 11pt;
  text-align: center;
  margin: 20pt 0 0 0;
  letter-spacing: 2px;
}
</style>
</head>
<body>
<div class="container">
  <img src="assets/rocket-icon.png" class="rocket-img" style="width: 60pt; height: 60pt;">
  <p class="soon">MUY PRONTO</p>
  <img src="assets/accent-purple.png" class="bar" style="width: 300pt; height: 3pt;">
  <p class="info">Registrate en</p>
  <p class="url">bladers-sf.vercel.app</p>
  <p class="social">Seguinos en @bladers.sfe</p>
  <p class="tagline">"Preparate para que cada batalla cuente"</p>
  <p class="brand">COPA OMEGA STAR</p>
</div>
</body>
</html>
