<!DOCTYPE html>
<html>
<head>
<style>
html { background: #0A0E1A; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  display: flex;
  background-image: url('assets/bg-dark.png');
  background-size: 720pt 405pt;
}
.container {
  margin: 25pt 40pt;
  width: 640pt;
}
h1 {
  color: #F59E0B;
  font-size: 22pt;
  font-weight: bold;
  margin: 0 0 4pt 0;
}
.bar { margin: 0 0 14pt 0; }
.table-wrapper {
  width: 640pt;
}
.table-header {
  display: flex;
  flex-direction: row;
  background: #8B5CF6;
  border-radius: 8pt 8pt 0 0;
  padding: 10pt 16pt;
}
.th-item { width: 280pt; }
.th-oc { width: 180pt; text-align: center; }
.th-price { width: 180pt; text-align: center; }
.th-text {
  color: #FFFFFF;
  font-size: 12pt;
  font-weight: bold;
  margin: 0;
}
.th-text-center {
  color: #FFFFFF;
  font-size: 12pt;
  font-weight: bold;
  margin: 0;
  text-align: center;
}
.table-row {
  display: flex;
  flex-direction: row;
  padding: 9pt 16pt;
  border-bottom: 1px solid #1E293B;
}
.row-dark { background: #111827; }
.row-light { background: #0F172A; }
.row-last { border-radius: 0 0 8pt 8pt; }
.td-item { width: 280pt; }
.td-oc { width: 180pt; text-align: center; }
.td-price { width: 180pt; text-align: center; }
.td-text {
  color: #FFFFFF;
  font-size: 11pt;
  margin: 0;
}
.td-text-center {
  color: #FFFFFF;
  font-size: 11pt;
  margin: 0;
  text-align: center;
}
.gold { color: #F59E0B; font-weight: bold; }
.muted { color: #94A3B8; }
.exclusive {
  color: #8B5CF6;
  font-style: italic;
}
</style>
</head>
<body>
<div class="container">
  <h1>Tabla de Valores (Omega Coins)</h1>
  <img src="assets/accent-gold.png" class="bar" style="width: 640pt; height: 3pt;">
  <div class="table-wrapper">
    <div class="table-header">
      <div class="th-item"><p class="th-text">Item</p></div>
      <div class="th-oc"><p class="th-text-center">Precio OC</p></div>
      <div class="th-price"><p class="th-text-center">Precio $</p></div>
    </div>
    <div class="table-row row-dark">
      <div class="td-item"><p class="td-text">Beyblade estandar</p></div>
      <div class="td-oc"><p class="td-text-center"><span class="gold">2.000</span></p></div>
      <div class="td-price"><p class="td-text-center">$25.000</p></div>
    </div>
    <div class="table-row row-light">
      <div class="td-item"><p class="td-text">Set especial</p></div>
      <div class="td-oc"><p class="td-text-center"><span class="gold">3.500</span></p></div>
      <div class="td-price"><p class="td-text-center">$40.000</p></div>
    </div>
    <div class="table-row row-dark">
      <div class="td-item"><p class="td-text">Estadio Xtreme</p></div>
      <div class="td-oc"><p class="td-text-center"><span class="gold">10.000</span></p></div>
      <div class="td-price"><p class="td-text-center">$120.000</p></div>
    </div>
    <div class="table-row row-light">
      <div class="td-item"><p class="td-text">Inscripcion torneo</p></div>
      <div class="td-oc"><p class="td-text-center"><span class="gold">50</span></p></div>
      <div class="td-price"><p class="td-text-center">$5.000</p></div>
    </div>
    <div class="table-row row-dark">
      <div class="td-item"><p class="td-text">Badge premium</p></div>
      <div class="td-oc"><p class="td-text-center"><span class="gold">200</span></p></div>
      <div class="td-price"><p class="td-text-center exclusive">Solo con OC</p></div>
    </div>
    <div class="table-row row-light row-last">
      <div class="td-item"><p class="td-text">Titulo custom</p></div>
      <div class="td-oc"><p class="td-text-center"><span class="gold">150</span></p></div>
      <div class="td-price"><p class="td-text-center exclusive">Solo con OC</p></div>
    </div>
  </div>
</div>
</body>
</html>
