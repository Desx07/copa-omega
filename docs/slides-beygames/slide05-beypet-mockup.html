<!DOCTYPE html>
<html>
<head>
<style>
html { background: #0A0E1A; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  display: flex;
  background-image: url('assets/bg-dark.png');
  background-size: 720pt 405pt;
}
.container {
  margin: 18pt 35pt;
  width: 650pt;
}
h1 {
  color: #06B6D4;
  font-size: 16pt;
  font-weight: bold;
  margin: 0 0 3pt 0;
  text-align: center;
}
.bar { margin: 0 0 10pt 0; display: flex; justify-content: center; }
.mockup-frame {
  background: #111827;
  border: 2px solid #1E293B;
  border-radius: 14pt;
  padding: 14pt;
  display: flex;
  flex-direction: row;
  gap: 20pt;
  align-items: flex-start;
}
.creature-col {
  width: 200pt;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.name-tag {
  color: #FFFFFF;
  font-size: 14pt;
  font-weight: bold;
  margin: 4pt 0 2pt 0;
  text-align: center;
}
.level-tag {
  color: #F59E0B;
  font-size: 10pt;
  font-weight: bold;
  margin: 0 0 4pt 0;
  text-align: center;
}
.stats-col {
  width: 400pt;
  display: flex;
  flex-direction: column;
}
.stat-row {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 6pt;
  margin: 0 0 6pt 0;
}
.stat-label {
  color: #94A3B8;
  font-size: 10pt;
  font-weight: bold;
  margin: 0;
  width: 40pt;
}
.stat-bar-bg {
  background: #1E293B;
  border-radius: 4pt;
  width: 230pt;
  height: 14pt;
}
.stat-atk {
  background: #EF4444;
  border-radius: 4pt;
  width: 172pt;
  height: 14pt;
}
.stat-def {
  background: #06B6D4;
  border-radius: 4pt;
  width: 138pt;
  height: 14pt;
}
.stat-sta {
  background: #10B981;
  border-radius: 4pt;
  width: 196pt;
  height: 14pt;
}
.stat-val {
  color: #FFFFFF;
  font-size: 10pt;
  font-weight: bold;
  margin: 0;
  width: 30pt;
}
.energy-section {
  margin: 10pt 0 0 0;
}
.energy-label {
  color: #F59E0B;
  font-size: 10pt;
  font-weight: bold;
  margin: 0 0 4pt 0;
}
.energy-bar-bg {
  background: #1E293B;
  border-radius: 4pt;
  width: 280pt;
  height: 14pt;
}
.energy-bar {
  background: #F59E0B;
  border-radius: 4pt;
  width: 224pt;
  height: 14pt;
}
.xp-section {
  margin: 10pt 0 0 0;
}
.xp-label {
  color: #8B5CF6;
  font-size: 10pt;
  font-weight: bold;
  margin: 0 0 4pt 0;
}
.xp-bar-bg {
  background: #1E293B;
  border-radius: 4pt;
  width: 280pt;
  height: 14pt;
}
.xp-bar {
  background: #8B5CF6;
  border-radius: 4pt;
  width: 140pt;
  height: 14pt;
}
.buttons-row {
  display: flex;
  flex-direction: row;
  gap: 12pt;
  margin: 14pt 0 0 0;
}
.btn-feed {
  background: #F59E0B;
  border-radius: 8pt;
  padding: 8pt 20pt;
}
.btn-feed-text {
  color: #0A0E1A;
  font-size: 11pt;
  font-weight: bold;
  margin: 0;
  text-align: center;
}
.btn-fight {
  background: #EF4444;
  border-radius: 8pt;
  padding: 8pt 20pt;
}
.btn-fight-text {
  color: #FFFFFF;
  font-size: 11pt;
  font-weight: bold;
  margin: 0;
  text-align: center;
}
.mockup-label {
  color: #475569;
  font-size: 9pt;
  margin: 6pt 0 0 0;
  text-align: center;
  font-style: italic;
}
</style>
</head>
<body>
<div class="container">
  <h1>BEYPET — Pantalla de Juego</h1>
  <div class="bar">
    <img src="assets/accent-cyan.png" style="width: 400pt; height: 3pt;">
  </div>
  <div class="mockup-frame">
    <div class="creature-col">
      <img src="assets/beypet-creature.png" style="width: 160pt; height: 160pt;">
      <p class="name-tag">SHARK SPIRIT</p>
      <p class="level-tag">CHAMPION</p>
    </div>
    <div class="stats-col">
      <div class="stat-row">
        <p class="stat-label">ATK</p>
        <div class="stat-bar-bg"><div class="stat-atk"></div></div>
        <p class="stat-val">75</p>
      </div>
      <div class="stat-row">
        <p class="stat-label">DEF</p>
        <div class="stat-bar-bg"><div class="stat-def"></div></div>
        <p class="stat-val">60</p>
      </div>
      <div class="stat-row">
        <p class="stat-label">STA</p>
        <div class="stat-bar-bg"><div class="stat-sta"></div></div>
        <p class="stat-val">85</p>
      </div>
      <div class="energy-section">
        <p class="energy-label">Energia: 80 / 100</p>
        <div class="energy-bar-bg"><div class="energy-bar"></div></div>
      </div>
      <div class="xp-section">
        <p class="xp-label">XP: 150 / 300 (Champion)</p>
        <div class="xp-bar-bg"><div class="xp-bar"></div></div>
      </div>
      <div class="buttons-row">
        <div class="btn-feed">
          <p class="btn-feed-text">ALIMENTAR</p>
        </div>
        <div class="btn-fight">
          <p class="btn-fight-text">BUSCAR PELEA</p>
        </div>
      </div>
    </div>
  </div>
  <p class="mockup-label">Mockup conceptual — interfaz dentro de la app Copa Omega Star</p>
</div>
</body>
</html>
