<!DOCTYPE html>
<html>
<head>
<style>
html { background: #0A0E1A; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  display: flex;
  background-image: url('assets/bg-title.png');
  background-size: 720pt 405pt;
}
.container {
  margin: 0; padding: 0;
  width: 720pt; height: 405pt;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.icons-row {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 14pt;
  margin: 0 0 16pt 0;
}
h1 {
  color: #FFFFFF;
  font-size: 44pt;
  font-weight: bold;
  text-align: center;
  margin: 0;
  letter-spacing: 6px;
}
.sub {
  color: #8B5CF6;
  font-size: 13pt;
  text-align: center;
  margin: 4pt 0 0 0;
  letter-spacing: 4px;
}
.bar { margin: 16pt 0; }
.subtitle {
  color: #94A3B8;
  font-size: 16pt;
  text-align: center;
  margin: 0;
}
.tagline {
  color: #06B6D4;
  font-size: 14pt;
  text-align: center;
  margin: 18pt 0 0 0;
  font-style: italic;
}
</style>
</head>
<body>
<div class="container">
  <div class="icons-row">
    <img src="assets/swords-icon.png" style="width: 44pt; height: 44pt;">
    <img src="assets/beypet-icon.png" style="width: 44pt; height: 44pt;">
    <img src="assets/gacha-icon.png" style="width: 44pt; height: 44pt;">
    <img src="assets/coliseum-icon.png" style="width: 44pt; height: 44pt;">
    <img src="assets/card-icon.png" style="width: 44pt; height: 44pt;">
    <img src="assets/gear-icon.png" style="width: 44pt; height: 44pt;">
  </div>
  <h1>BEYGAMES</h1>
  <p class="sub">MODOS DE JUEGO</p>
  <img src="assets/accent-purple.png" class="bar" style="width: 400pt; height: 3pt;">
  <p class="subtitle">Copa Omega Star — Bladers Santa Fe</p>
  <p class="tagline">"Nuevas formas de competir, ganar y divertirse"</p>
</div>
</body>
</html>
