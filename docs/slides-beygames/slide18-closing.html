<!DOCTYPE html>
<html>
<head>
<style>
html { background: #0A0E1A; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  display: flex;
  background-image: url('assets/bg-closing.png');
  background-size: 720pt 405pt;
}
.container {
  margin: 0; padding: 0;
  width: 720pt; height: 405pt;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.coming-soon {
  color: #F59E0B;
  font-size: 12pt;
  font-weight: bold;
  letter-spacing: 6px;
  margin: 0 0 12pt 0;
  text-align: center;
}
h1 {
  color: #FFFFFF;
  font-size: 34pt;
  font-weight: bold;
  text-align: center;
  margin: 0;
  letter-spacing: 2px;
}
.bar { margin: 16pt 0; }
.icons-row {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 18pt;
  margin: 0 0 18pt 0;
}
.modes-text {
  color: #94A3B8;
  font-size: 16pt;
  text-align: center;
  margin: 0 0 6pt 0;
}
.tagline {
  color: #06B6D4;
  font-size: 14pt;
  text-align: center;
  margin: 0;
  font-style: italic;
}
.url {
  color: #8B5CF6;
  font-size: 13pt;
  text-align: center;
  margin: 24pt 0 0 0;
  letter-spacing: 2px;
}
</style>
</head>
<body>
<div class="container">
  <p class="coming-soon">PROXIMAMENTE</p>
  <h1>COPA OMEGA STAR</h1>
  <img src="assets/accent-purple.png" class="bar" style="width: 400pt; height: 3pt;">
  <div class="icons-row">
    <img src="assets/beypet-icon.png" style="width: 36pt; height: 36pt;">
    <img src="assets/swords-icon.png" style="width: 36pt; height: 36pt;">
    <img src="assets/gacha-icon.png" style="width: 36pt; height: 36pt;">
    <img src="assets/gear-icon.png" style="width: 36pt; height: 36pt;">
    <img src="assets/coliseum-icon.png" style="width: 36pt; height: 36pt;">
    <img src="assets/card-icon.png" style="width: 36pt; height: 36pt;">
  </div>
  <p class="modes-text">6 modos de juego — infinitas formas de competir</p>
  <p class="tagline">"La competencia nunca fue tan divertida"</p>
  <p class="url">bladers-sf.vercel.app</p>
</div>
</body>
</html>
