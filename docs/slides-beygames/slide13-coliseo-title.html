<!DOCTYPE html>
<html>
<head>
<style>
html { background: #0A0E1A; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  display: flex;
  background-image: url('assets/bg-section.png');
  background-size: 720pt 405pt;
}
.container {
  margin: 0; padding: 0;
  width: 720pt; height: 405pt;
  display: flex;
  flex-direction: row;
  align-items: center;
}
.left {
  width: 400pt;
  display: flex;
  flex-direction: column;
  margin: 0 0 0 50pt;
}
.right {
  width: 220pt;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 0 0 0 20pt;
}
.label {
  color: #EF4444;
  font-size: 11pt;
  font-weight: bold;
  letter-spacing: 4px;
  margin: 0 0 8pt 0;
}
h1 {
  color: #FFFFFF;
  font-size: 36pt;
  font-weight: bold;
  margin: 0 0 4pt 0;
}
.accent { color: #EF4444; }
.bar { margin: 12pt 0 16pt 0; }
.subtitle {
  color: #94A3B8;
  font-size: 16pt;
  margin: 0;
  font-style: italic;
}
.tagline {
  color: #EF4444;
  font-size: 12pt;
  margin: 16pt 0 0 0;
}
</style>
</head>
<body>
<div class="container">
  <div class="left">
    <p class="label">MODO 5</p>
    <h1>COLISEO</h1>
    <h1 class="accent" style="font-size: 20pt; margin: 0;">Battle Royale</h1>
    <img src="assets/accent-red.png" class="bar" style="width: 300pt; height: 3pt;">
    <p class="subtitle">8 entran, 1 sale campeon</p>
    <p class="tagline">Evento especial con pozo de OC</p>
  </div>
  <div class="right">
    <img src="assets/coliseum-icon.png" style="width: 180pt; height: 180pt;">
  </div>
</div>
</body>
</html>
